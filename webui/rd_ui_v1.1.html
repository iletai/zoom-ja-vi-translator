        </svg>
      ),
    };

    /* ========= Flag Icons (SVG) ========= */
    const FlagIcon = ({ code, size=18 }) => {
      const uid = useId();
      const safeUid = String(uid).replace(/:/g, "_");
      const common = { width:size, height:size, viewBox:"0 0 24 24", style:{flexShrink:0} };
      const frame = (children) => (
        <svg {...common} className="flagFrame" aria-hidden="true">
          <defs>
            <clipPath id={`r_${code}_${safeUid}`}>
              <rect x="2" y="4" width="20" height="16" rx="4" ry="4"></rect>
            </clipPath>
          </defs>
          <rect x="2" y="4" width="20" height="16" rx="4" ry="4" fill="#fff" stroke="rgba(0,0,0,0.12)"/>
          <g clipPath={`url(#r_${code}_${safeUid})`}>{children}</g>
        </svg>
      );

      // Auto（自動判定）用：旗が無いのでAバッジ
      if (code === "auto") return frame(
        <>
          <rect x="2" y="4" width="20" height="16" fill="#EEF2FF"/>
          <circle cx="12" cy="12" r="5.3" fill="#FFFFFF" opacity="0.96"/>
          <text
            x="12" y="15"
            textAnchor="middle"
            fontSize="10"
            fontWeight="900"
            fill="#1F6FEB"
            fontFamily="ui-sans-serif, system-ui, -apple-system, 'Noto Sans JP'"
          >A</text>
        </>
      );

      if (code === "ja") return frame(<><rect x="2" y="4" width="20" height="16" fill="#fff"/><circle cx="12" cy="12" r="4.2" fill="#D32F2F"/></>);
      if (code === "vi") return frame(<><rect x="2" y="4" width="20" height="16" fill="#D32F2F"/><path d="M12 8.2l1.1 3.0h3.2l-2.6 1.9 1 3.1L12 14.4 9.3 16.2l1-3.1-2.6-1.9h3.2z" fill="#FBC02D"/></>);
      if (code === "en") return frame(<>
        <rect x="2" y="4" width="20" height="16" fill="#fff"/>
        {[...Array(6)].map((_,i)=>(<rect key={i} x="2" y={4+i*2.66} width="20" height="1.33" fill="#C62828"/>))}
        <rect x="2" y="4" width="9" height="7.5" fill="#1565C0"/>
      </>);
      if (code === "zh") return frame(<><rect x="2" y="4" width="20" height="16" fill="#C62828"/><path d="M7 7.2l.7 2h2.2l-1.8 1.3.7 2.1-1.8-1.2-1.8 1.2.7-2.1-1.8-1.3h2.2z" fill="#FBC02D"/></>);
      if (code === "ko") return frame(<>
        <rect x="2" y="4" width="20" height="16" fill="#fff"/>
        <path d="M12 8.2a3.8 3.8 0 0 1 3.8 3.8c0 2.1-1.7 3.8-3.8 3.8a1.9 1.9 0 1 1 0-3.8c1 0 1.9-.9 1.9-1.9S13 8.2 12 8.2z" fill="#D32F2F"/>
        <path d="M12 15.8a3.8 3.8 0 0 1-3.8-3.8c0-2.1 1.7-3.8 3.8-3.8a1.9 1.9 0 1 1 0 3.8c-1 0-1.9.9-1.9 1.9S11 15.8 12 15.8z" fill="#1565C0"/>
      </>);
      return frame(<rect x="2" y="4" width="20" height="16" fill="#9CA3AF"/>);
    };

    /* ========= Custom dropdown ========= */
    const LangDropdown = ({ value, onChange, options, disabled=false }) => {
      const [open, setOpen] = useState(false);
      const rootRef = useRef(null);

      const selected = options.find(o => o.value === value) || options[0];

      useEffect(() => {
        const onDown = (e) => {
          if (!open) return;
          if (!rootRef.current) return;
          if (!rootRef.current.contains(e.target)) setOpen(false);
        };
        window.addEventListener("mousedown", onDown);
        return () => window.removeEventListener("mousedown", onDown);
      }, [open]);

      return (
        <div className="cSelect" ref={rootRef}>
          <button
            type="button"
            className="cSelectBtn"
            disabled={disabled}
            onClick={()=>setOpen(v=>!v)}
            aria-haspopup="listbox"
            aria-expanded={open}
          >
            <span className="cSelectLeft">
              <FlagIcon code={selected.value} />
              <span className="cSelectLabel">{selected.label}</span>
            </span>
            <span className="cSelectCaret">▾</span>
          </button>

          {open && (
            <div className="cSelectMenu" role="listbox">
              {options.map(o => (
                <button
                  key={o.value}
                  type="button"
                  className={"cSelectItem " + (o.value===value ? "active" : "")}
                  onClick={()=>{ onChange(o.value); setOpen(false); }}
                >
                  <FlagIcon code={o.value} />
                  <span style={{flex:1, minWidth:0}}>
                    {o.label} <small>({o.value})</small>
                  </span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    };

    /* ========= Simple parts ========= */
    const Card = ({ title, right=null, children }) => (
      <div className="card">
        <div className="card-hd">
          <div className="card-ttl">{title}</div>
          {right}
        </div>
        <div className="card-bd">{children}</div>
      </div>
    );

    const FormRow = ({ label, right=null, children, help=null }) => (
      <div className="formrow">
        <div className="label"><div>{label}</div>{right}</div>
        {children}
        {help && <div className="help">{help}</div>}
      </div>
    );

    const Toggle = ({ checked, onChange, label, disabled=false }) => (
      <label className="toggle" style={{opacity: disabled?0.65:1, cursor: disabled?"not-allowed":"pointer"}}>
        <input type="checkbox" checked={!!checked} disabled={disabled} onChange={(e)=>onChange(e.target.checked)} />
        <span>{label}</span>
      </label>
    );

    const Select = ({ value, onChange, options, disabled=false }) => (
      <select className="field" value={value} disabled={disabled} onChange={(e)=>onChange(e.target.value)}>
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    );

    /* =====================================================================================
       Views (重要): Appの外に出して「再マウント→スクロールが上に戻る」問題を防止
       ===================================================================================== */

    function TranslateView({
      toast,
      t,
      running,
      fromLang, toLang,
      live, showSource,
      sentenceBuf,
      activeSession,
      selectedSegId, setSelectedSegId,
      copySeg,
      exportSessionJson
    }){
      const segs = activeSession?.transcript || [];
      const selected = segs.find(x => x.id === selectedSegId) || null;

      const fromMono = fromLang === "auto" ? "AUTO" : fromLang.toUpperCase();

      return (
        <div className="subtitleShell">
          <div className="liveBox">
            <div className="liveTop">
              <div className="badge">
                <FlagIcon code={fromLang} size={16} />
                <span className="mono">{fromMono}</span>
                <span>→</span>
                <FlagIcon code={toLang} size={16} />
                <span className="mono">{toLang.toUpperCase()}</span>
              </div>
              <div className="liveTime">{formatTimeMs(live.tsMs)}</div>
            </div>

            <div className="liveText">
              {(live.dstText || "").trim() || (running ? "…" : t("startPrompt"))}
            </div>

            {showSource && (
              <div className="liveSrc">
                <span className="mono" style={{fontSize:12, color:"var(--color-text-secondary)"}}>[SRC]</span>{" "}
                {(live.srcText || "").trim() || "…"}
              </div>
            )}

            <div className="liveHint">
              <div>{t("liveHintTitle")}（{t("liveHintEngine")}）</div>
              <div className="mono">history:{segs.length} / buf:{(sentenceBuf.dstAcc||"").length} chars</div>
            </div>
          </div>

          <div className="historyWrap">
            <div className="historyHd">
              <div className="historyTtl">{t("pastLog")}</div>
              <div style={{display:"flex", gap:8}}>
                <button className="btn btn-ghost" onClick={()=>{
                  if (!selected) {
                    toast.show({variant:"danger", title:t("copySel"), description:t("noSentenceLog")});
                    return;
                  }
                  copySeg(selected, showSource ? "both" : "dst");
                }}>
                  {t("copySel")}
                </button>
                <button className="btn btn-ghost" onClick={()=>exportSessionJson(activeSession)} disabled={!activeSession}>
                  {t("jsonOut")}
                </button>
              </div>
            </div>

            <div className="historyBd">
              {!activeSession ? (
                <div className="muted">{t("noActiveSession")}</div>
              ) : segs.length === 0 ? (
                <div className="muted">
                  {t("noSentenceLog")}
                </div>
              ) : (
                segs.map(seg => {
                  const isSel = seg.id === selectedSegId;
                  return (
                    <div
                      key={seg.id}
                      className={"timelineItem " + (isSel ? "selected" : "")}
                      onClick={()=>setSelectedSegId(seg.id)}
                      title="クリックで選択"
                    >
                      <div>
                        <div className="tTime">{formatTimeMs(seg.tsMs)}</div>
                        <div className="tTag">{seg.reason || "segment"}</div>
                      </div>
                      <div className="tMain">
                        {isSel && (
                          <div className="copyBadge" onClick={(e)=>{ e.stopPropagation(); copySeg(seg, showSource ? "both" : "dst"); }} title="COPY">
                            COPY
                          </div>
                        )}
                        <div className="tDst">{seg.dstText || "…"}</div>
                        {showSource && (
                          <div className="tSrc">
                            <span className="mono" style={{fontSize:12}}>[SRC]</span>{" "}
                            {seg.srcText || "…"}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>
        </div>
      );
    }

    function HistoryView({
      t,
      sessions,
      selectedSessionId, setSelectedSessionId,
      selectedSession,
      selectedHistSegId, setSelectedHistSegId,
      showSource,
      copySeg,
      exportSessionJson,
    }){
      // group by day
      const groups = useMemo(() => {
        const map = new Map();
        sessions.forEach(s => {
          const k = dateKey(s.startTsMs);
          if (!map.has(k)) map.set(k, []);
          map.get(k).push(s);
        });
        const keys = Array.from(map.keys()).sort((a,b)=> b.localeCompare(a));
        const labelFor = (ms) => {
          const k = dateKey(ms);
          const today = dateKey(Date.now());
          const y = new Date(); y.setDate(y.getDate()-1);
          if (k === today) return t("today");
          if (k === dateKey(+y)) return t("yesterday");
          return k;
        };
        return keys.map(k => {
          const items = map.get(k).sort((a,b)=> b.startTsMs - a.startTsMs);
          return { key: k, label: labelFor(items[0].startTsMs), items };
        });
      }, [sessions, t]);

      // collapse state (seed once)
      const [openMap, setOpenMap] = useState({});
      const seededRef = useRef(false);
      useEffect(() => {
        if (seededRef.current) return;
        seededRef.current = true;

        const today = dateKey(Date.now());
        const next = {};
        groups.forEach(g => next[g.key] = (g.key === today));
        if (!next[today] && groups[0]) next[groups[0].key] = true;
        setOpenMap(next);
      }, [groups]);

      // add keys if new day appears
      useEffect(() => {
        setOpenMap(prev => {
          const next = { ...prev };
          groups.forEach(g => {
            if (typeof next[g.key] !== "boolean") next[g.key] = false;
          });
          return next;
        });
      }, [groups]);

      const toggleGroup = (key) => setOpenMap(prev => ({ ...prev, [key]: !prev[key] }));

      // minimap (重要): scrollIntoView廃止 → scrollTop直指定で「上に戻る」事故を防止
      const segs = selectedSession?.transcript ?? [];
      const scrollRef = useRef(null);
      const minimapRef = useRef(null);
      const [vp, setVp] = useState({ top: 0, height: 20 });

      useEffect(() => {
        const el = scrollRef.current;
        if (!el) return;

        let raf = 0;
        const onScroll = () => {
          cancelAnimationFrame(raf);
          raf = requestAnimationFrame(() => {
            const st = el.scrollTop;
            const sh = el.scrollHeight;
            const ch = el.clientHeight;
            const max = Math.max(1, sh - ch);
            const topRatio = st / max;
            const heightRatio = ch / Math.max(1, sh);
            setVp({
              top: topRatio * 100,
              height: Math.max(6, heightRatio * 100)
            });
          });
        };

        onScroll();
        el.addEventListener("scroll", onScroll, { passive:true });
        return () => {
          cancelAnimationFrame(raf);
          el.removeEventListener("scroll", onScroll);
        };
      }, [selectedSessionId]);

      useEffect(() => {
        // セッション切替時：右詳細だけ先頭へ
        const el = scrollRef.current;
        if (el) el.scrollTop = 0;
        setSelectedHistSegId(null);
      }, [selectedSessionId, setSelectedHistSegId]);

      const jumpByRatio = useCallback((ratio01) => {
        const el = scrollRef.current;
        if (!el) return;
        const max = Math.max(0, el.scrollHeight - el.clientHeight);
        el.scrollTop = Math.round(max * ratio01);
      }, []);

      const onMinimapPointerDown = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();

        const mm = minimapRef.current;
        if (!mm) return;

        const rect = mm.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const ratio = Math.max(0, Math.min(1, y / rect.height));
        jumpByRatio(ratio);
      }, [jumpByRatio]);

      return (
        <div className="historyLayout">
          {/* LEFT */}
          <div className="panel">
            <div className="panelHd">
              <div className="panelTtl">{t("histTitle")}</div>
              <div style={{display:"flex", gap:8}}>
                <button className="btn" disabled>{t("total")}: {sessions.length}</button>
                <button
                  className="btn btn-ghost"
                  onClick={()=>{
                    const anyOpen = groups.some(g => openMap[g.key]);
                    const next = {};
                    groups.forEach(g => next[g.key] = !anyOpen);
                    setOpenMap(next);
                  }}
                  title={t("toggleAll")}
                >
                  {t("toggleAll")}
                </button>
              </div>
            </div>

            <div className="panelBd">
              {sessions.length === 0 ? (
                <div className="muted">{t("histEmpty")}</div>
              ) : (
                <div className="sessionList">
                  {groups.map(g => {
                    const open = !!openMap[g.key];
                    return (
                      <div className="dayGroup" key={g.key}>
                        <div className="dayGroupHd" onClick={()=>toggleGroup(g.key)} title="クリックで折り畳み">
                          <div className="dayLeft">
                            <div className="dayLabel">{g.label}</div>
                            <div className="dayKey">{g.key}</div>
                          </div>
                          <div className="dayRight">
                            <div className="countPill">{g.items.length}件</div>
                            <div className={"chev " + (open ? "open" : "")}>▾</div>
                          </div>
                        </div>

                        {open && (
                          <div className="dayGroupBd">
                            {g.items.map(s => {
                              const sel = s.id === selectedSessionId;
                              const statusKey = s.status === "running" ? "run" : s.status === "error" ? "err" : "done";

                              const start = formatDateTime(s.startTsMs);
                              const end = s.endTsMs ? formatDateTime(s.endTsMs) : "—";
                              const dur = s.endTsMs ? Math.max(0, Math.floor((s.endTsMs - s.startTsMs)/1000)) : null;
                              const durText = dur !== null ? `${Math.floor(dur/60)}m${String(dur%60).padStart(2,"0")}s` : "—";

                              const segCount = s.transcript?.length ?? 0;
                              const avgRtf = avg(s.metrics?.rtfSamples || []);
                              const avgLat = avg(s.metrics?.latencySamples || []);

                              const fromMono = s.fromLang === "auto" ? "AUTO" : String(s.fromLang).toUpperCase();

                              return (
                                <div
                                  key={s.id}
                                  className={"sessRow " + (sel ? "selected" : "")}
                                  onClick={()=>{
                                    setSelectedSessionId(s.id);
                                    setSelectedHistSegId(null);
                                  }}
                                  title="クリックで詳細表示"
                                >
                                  <div className="sessMain">
                                    <div className="sessTop">
                                      <div className="sessTitle">
                                        <FlagIcon code={s.fromLang} size={16}/>
                                        <span className="mono">{fromMono}</span>
                                        <span>→</span>
                                        <FlagIcon code={s.toLang} size={16}/>
                                        <span className="mono">{String(s.toLang).toUpperCase()}</span>
                                      </div>
                                      <span className={"pillMini " + statusKey}>
                                        {statusKey === "run" ? "RUN" : statusKey === "err" ? "ERR" : "DONE"}
                                      </span>
                                    </div>

                                    <div className="sessMeta">
                                      <span>start {start}</span>
                                      <span>end {end}</span>
                                      <span>dur {durText}</span>
                                    </div>

                                    <div className="chips">
                                      <span className="chip">SEG {segCount}</span>
                                      <span className="chip">avgRTF {avgRtf !== null ? avgRtf.toFixed(2) : "-"}</span>
                                      <span className="chip">avgLat {avgLat !== null ? Math.round(avgLat)+"ms" : "-"}</span>
                                    </div>

                                    {s.errorMessage && (
                                      <div className="muted" style={{color:"var(--color-danger)", marginTop:8, fontWeight:900}}>
                                        {s.errorMessage}
                                      </div>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* RIGHT */}
          <div className="panel">
            <div className="panelHd">
              <div className="panelTtl">{t("sessDetail")}</div>
              <div style={{display:"flex", gap:8}}>
                <button className="btn" disabled={!selectedSession}>
                  SEG {selectedSession ? selectedSession.transcript.length : "-"}
                </button>
                <button className="btn btn-ghost" disabled={!selectedSession} onClick={()=>exportSessionJson(selectedSession)}>
                  JSON出力
                </button>
              </div>
            </div>

            {!selectedSession ? (
              <div className="panelBd"><div className="muted">{t("pickSession")}</div></div>
            ) : (
              <div className="detailOuter">
                <div
                  className="minimap"
                  ref={minimapRef}
                  onPointerDown={onMinimapPointerDown}
                  role="button"
                  tabIndex={-1}
                  title="クリックでジャンプ"
                >
                  {segs.map((seg, i) => {
                    const top = segs.length <= 1 ? 0 : (i / (segs.length - 1)) * 100;
                    const cls = seg.reason === "segmentEnd" ? "segEnd" : "punct";
                    const isSel = seg.id === selectedHistSegId;
                    return (
                      <div
                        key={seg.id}
                        className={"miniTick " + cls + (isSel ? " selected" : "")}
                        style={{ top: `${top}%` }}
                      />
                    );
                  })}
                  <div className="miniViewport" style={{ top: `${vp.top}%`, height: `${vp.height}%` }} />
                </div>

                <div className="detailScroll" ref={scrollRef}>
                  {segs.length === 0 ? (
                    <div className="muted">{t("noSubLog")}</div>
                  ) : (
                    segs.map(seg => {
                      const isSel = seg.id === selectedHistSegId;
                      return (
                        <div
                          key={seg.id}
                          className={"timelineItem " + (isSel ? "selected" : "")}
                          onClick={()=>setSelectedHistSegId(seg.id)}
                          title="クリックで選択"
                        >
                          <div>
                            <div className="tTime">{formatTimeMs(seg.tsMs)}</div>
                            <div className="tTag">{seg.reason || "segment"}</div>
                          </div>
                          <div className="tMain">
                            {isSel && (
                              <div className="copyBadge" onClick={(e)=>{ e.stopPropagation(); copySeg(seg, showSource ? "both" : "dst"); }} title="COPY">
                                COPY
                              </div>
                            )}
                            <div className="tDst">{seg.dstText || "…"}</div>
                            {showSource && (
                              <div className="tSrc">
                                <span className="mono" style={{fontSize:12}}>[SRC]</span>{" "}
                                {seg.srcText || "…"}
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function SettingsView({
      t,
      theme, setTheme,
      uiLang, setUiLang,
      running,
      inputDevices,
      inputDeviceId, setInputDeviceId,
      showSource, setShowSource,
      partialResults, setPartialResults,
      demoMode, setDemoMode,
      autoSaveMs, setAutoSaveMs,
      requestDeviceTest,
    }){
      return (
        <div style={{display:"grid", gridTemplateColumns:"1fr", gap:14}}>
          <Card title={t("theme") + " / " + t("uiLang")}>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14}}>
              <FormRow label={t("theme")}>
                <Select
                  value={theme}
                  onChange={setTheme}
                  options={[
                    { value:"light", label:t("themeLight") },
                    { value:"dark", label:t("themeDark") },
                  ]}
                />
              </FormRow>
              <FormRow label={t("uiLang")}>
                <Select
                  value={uiLang}
                  onChange={setUiLang}
                  options={[
                    { value:"ja", label:"日本語" },
                    { value:"vi", label:"Tiếng Việt" },
                    { value:"en", label:"English" },
                  ]}
                />
              </FormRow>
            </div>
          </Card>

          <Card
            title={t("settings")}
            right={<button className="btn" onClick={requestDeviceTest} disabled={running} title={t("connTest")}>{t("connTest")}</button>}
          >
            <div className="muted" style={{marginBottom:10}}>
              {t("settingsLocked")}
            </div>

            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14}}>
              <div>
                <FormRow label={t("inputDevice")}>
                  <Select
                    value={inputDeviceId}
                    onChange={setInputDeviceId}
                    disabled={running}
                    options={inputDevices.map(d => ({ value:d.id, label:d.name }))}
                  />
                </FormRow>

                <FormRow label={t("showSrc")} help={t("showSrcHelp")}>
                  <Toggle checked={showSource} onChange={setShowSource} disabled={running} label={t("showSrcLabel")} />
                </FormRow>

                <FormRow label={t("partial")}>
                  <Toggle checked={partialResults} onChange={setPartialResults} disabled={running} label={t("partialLabel")} />
                </FormRow>

                <FormRow label={t("demoMode")}>
                  <Toggle checked={demoMode} onChange={setDemoMode} disabled={running} label={t("demoLabel")} />
                </FormRow>
              </div>

              <div>
                <FormRow
                  label={t("autoSave")}
                  right={<span className="mono" style={{fontSize:12, color:"var(--color-text-secondary)"}}>{autoSaveMs}ms</span>}
                >
                  <input
                    className="field"
                    type="range"
                    min="200"
                    max="2000"
                    step="100"
                    value={autoSaveMs}
                    onChange={(e)=>setAutoSaveMs(Number(e.target.value))}
                    disabled={running}
                  />
                </FormRow>
              </div>
            </div>
          </Card>
        </div>
      );
    }

    /* ========= App ========= */
    function App(){
      const toast = useToast();

      const [page, setPage] = useState("translate"); // translate | history | settings

      // UI preferences: theme + language (persisted)
      const [theme, setTheme] = useState(initialTheme);
      const [uiLang, setUiLang] = useState(initialUiLang);
      const t = useCallback((key) => (STRINGS[uiLang] && STRINGS[uiLang][key]) || STRINGS.ja[key] || key, [uiLang]);
      useEffect(() => { applyTheme(theme); }, [theme]);
      useEffect(() => { try{ localStorage.setItem("speaksy.uiLang", uiLang); }catch{} }, [uiLang]);

      // engine state
      const [connected, setConnected] = useState(HostBridge.hasHost());
      const [running, setRunning] = useState(false);
      const [engineDevice, setEngineDevice] = useState("CPU");
      const [stateText, setStateText] = useState("Idle");
      const [rtf, setRtf] = useState(null);
      const [latencyMs, setLatencyMs] = useState(null);
      const [lastError, setLastError] = useState(null);

      // settings
      const [inputDevices, setInputDevices] = useState([
        { id:"default", name:"(デモ) Default Device" },
        { id:"vb_cable", name:"(デモ) VB-Audio Cable" },
      ]);
      const [inputDeviceId, setInputDeviceId] = useState("default");
      const [partialResults, setPartialResults] = useState(true);
      const [autoSaveMs, setAutoSaveMs] = useState(800);
      const [demoMode, setDemoMode] = useState(!HostBridge.hasHost());
      const [showSource, setShowSource] = useState(true);

      // langs（To用 / From用で分離）
      const LANGS_TO = useMemo(() => ([
        { value:"ja", label:"日本語" },
        { value:"vi", label:"ベトナム語" },
        { value:"en", label:"英語" },
        { value:"zh", label:"中国語" },
        { value:"ko", label:"韓国語" },
      ]), []);
      const LANGS_FROM = useMemo(() => ([
        { value:"auto", label:"Auto（自動判定）" },
        ...LANGS_TO
      ]), [LANGS_TO]);

      // ★ FromのデフォルトをAutoへ
      const [fromLang, setFromLang] = useState("auto");
      const [toLang, setToLang] = useState("ja");

      // live
      const [live, setLive] = useState({ tsMs: Date.now(), srcText:"", dstText:"", partial:false });
      const [sentenceBuf, setSentenceBuf] = useState({ srcAcc:"", dstAcc:"", lastFinalSrc:"", lastFinalDst:"" });

      // sessions persist
      const [sessions, setSessions] = useState(() => loadJson("speaksy.sessions", []));
      const [activeSessionId, setActiveSessionId] = useState(null);

      // translate selection
      const [selectedSegId, setSelectedSegId] = useState(null);

      // history selection
      const [selectedSessionId, setSelectedSessionId] = useState(null);
      const [selectedHistSegId, setSelectedHistSegId] = useState(null);

      useEffect(() => { saveJson("speaksy.sessions", sessions); }, [sessions]);

      // settings forbidden while running
      useEffect(() => {
        if (running && page === "settings") setPage("translate");
      }, [running, page]);

      const canStart = connected || demoMode;

      const statusKind = useMemo(() => {
        if (!connected && !demoMode) return "err";
        if (lastError) return "err";
        if (running) return "run";
        return "idle";
      }, [connected, demoMode, lastError, running]);

      const statusLabel = useMemo(() => {
        if (!connected && !demoMode) return t("stDisconnected");
        if (lastError) return t("stErr");
        if (running) return t("stRun");
        return t("stIdle");
      }, [connected, demoMode, lastError, running, t]);

      const engineInfo = useMemo(() => {
        const parts = [];
        parts.push(stateText);
        parts.push(engineDevice);
        if (typeof latencyMs === "number") parts.push(`${latencyMs}ms`);
        if (typeof rtf === "number") parts.push(`RTF ${rtf.toFixed(2)}`);
        return parts.join(" / ");
      }, [stateText, engineDevice, latencyMs, rtf]);

      // ★ Autoのとき swap は意味が崩れるので禁止
      const swapLang = () => {
        if (running) return;
        if (fromLang === "auto") return;
        const a = fromLang; setFromLang(toLang); setToLang(a);
      };

      const updateSession = useCallback((id, updater) => {
        setSessions(prev => prev.map(s => s.id === id ? updater(s) : s));
      }, []);

      const createSession = useCallback(() => {
        const now = Date.now();
        const id = `sess-${now}-${Math.random().toString(16).slice(2)}`;
        const s = {
          id,
          startTsMs: now,
          endTsMs: null,
          fromLang, toLang, inputDeviceId,
          status: "running",
          errorMessage: null,
          metrics: { rtfSamples: [], latencySamples: [] },
          transcript: []
        };
        setSessions(prev => [s, ...prev].slice(0, 200));
        setActiveSessionId(id);
        setSelectedSessionId(id);
        return id;
      }, [fromLang, toLang, inputDeviceId]);

      const finishSession = useCallback((id, status, errorMessage=null) => {
        updateSession(id, (s) => ({ ...s, endTsMs: Date.now(), status, errorMessage }));
        setActiveSessionId(null);
      }, [updateSession]);

      const pushTranscript = useCallback((sessionId, seg) => {
        updateSession(sessionId, (s) => ({
          ...s,
          transcript: [seg, ...s.transcript].slice(0, 1500)
        }));
      }, [updateSession]);

      const pushMetrics = useCallback((sessionId, rtfVal, latencyVal) => {
        updateSession(sessionId, (s) => ({
          ...s,
          metrics: {
            rtfSamples: (typeof rtfVal === "number") ? [rtfVal, ...s.metrics.rtfSamples].slice(0, 500) : s.metrics.rtfSamples,
            latencySamples: (typeof latencyVal === "number") ? [latencyVal, ...s.metrics.latencySamples].slice(0, 500) : s.metrics.latencySamples,
          }
        }));
      }, [updateSession]);

      const activeSession = useMemo(
        () => sessions.find(s => s.id === activeSessionId) || null,
        [sessions, activeSessionId]
      );
      const selectedSession = useMemo(
        () => sessions.find(s => s.id === selectedSessionId) || null,
        [sessions, selectedSessionId]
      );

      const onStart = () => {
        if (!canStart) {
          toast.show({ variant:"danger", title:"開始できません", description:"未接続です。設定でデバイスを確認してください。" });
          return;
        }
        setLastError(null);
        setSelectedSegId(null);
        setLive({ tsMs: Date.now(), srcText:"", dstText:"", partial:false });
        setSentenceBuf({ srcAcc:"", dstAcc:"", lastFinalSrc:"", lastFinalDst:"" });

        createSession();
        setRunning(true);
        setStateText("Starting...");

        HostBridge.post({
          type:"engine/start",
          payload:{ inputDeviceId, fromLang, toLang, partialResults, autoSaveMs: Number(autoSaveMs) }
        });

        toast.show({ variant:"info", title:"Speaksy", description:"翻訳を開始しました。" });
        setPage("translate");
      };

      const onStop = () => {
        setRunning(false);
        setStateText("Stopping...");
        HostBridge.post({ type:"engine/stop" });

        if (activeSessionId) {
          setSentenceBuf(prev => {
            const src = prev.srcAcc.trim();
            const dst = prev.dstAcc.trim();
            if (src || dst) {
              pushTranscript(activeSessionId, {
                id: `seg-${Date.now()}-${Math.random().toString(16).slice(2)}`,
                tsMs: Date.now(),
                srcText: src,
                dstText: dst,
                reason: "flush"
              });
            }
            return { ...prev, srcAcc:"", dstAcc:"" };
          });
          finishSession(activeSessionId, "done");
        }

        toast.show({ variant:"info", title:"Speaksy", description:"翻訳を停止しました。" });
      };

      const copySeg = useCallback(async (seg, mode="both") => {
        const text = mode === "dst" ? (seg.dstText || "") : `[SRC] ${seg.srcText || ""}\n[DST] ${seg.dstText || ""}`;
        try{
          await navigator.clipboard.writeText(text);
          toast.show({ variant:"success", title:"コピーしました", description:`${formatTimeMs(seg.tsMs)} をコピーしました。` });
        }catch{
          toast.show({ variant:"danger", title:"コピー失敗", description:"クリップボードにアクセスできませんでした。" });
        }
      }, [toast]);

      const exportSessionJson = useCallback((session) => {
        if (!session) return;
        const data = { session, transcript: session.transcript.slice().reverse() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `speaksy_session_${session.id}.json`;
        a.click();
        URL.revokeObjectURL(url);
        toast.show({ variant:"info", title:"JSON出力", description:"セッションJSONをダウンロードしました。" });
      }, [toast]);

      const requestDeviceTest = useCallback(() => {
        if (!HostBridge.hasHost()) {
          toast.show({ variant:"info", title:"接続テスト", description:"（デモ）ホスト未接続のためHostテストは省略します。" });
          return;
        }
        toast.show({ variant:"info", title:"接続テスト", description:"テスト要求を送信しました…" });
        HostBridge.post({ type:"engine/testDevice", payload:{ inputDeviceId } });
      }, [toast, inputDeviceId]);

      // autosave snapshot (host)
      useEffect(() => {
        if (!running) return;
        const iv = clamp(Number(autoSaveMs) || 800, 200, 5000);
        const t = setInterval(() => {
          HostBridge.post({
            type: "ui/textSnapshot",
            payload: {
              tsMs: Date.now(),
              fromLang, toLang,
              liveSrc: live.srcText ?? "",
              liveDst: live.dstText ?? "",
              bufSrc: sentenceBuf.srcAcc ?? "",
              bufDst: sentenceBuf.dstAcc ?? "",
            }
          });
        }, iv);
        return () => clearInterval(t);
      }, [running, autoSaveMs, fromLang, toLang, live.srcText, live.dstText, sentenceBuf.srcAcc, sentenceBuf.dstAcc]);

      // host messages
      useEffect(() => {
        const off = HostBridge.onMessage((msg) => {
          if (!msg || typeof msg !== "object") return;

          if (msg.type === "engine/devices") {
            const devs = msg.payload?.inputDevices ?? [];
            if (Array.isArray(devs) && devs.length) setInputDevices(devs);
            const def = msg.payload?.defaultInputDeviceId;
            if (def) setInputDeviceId(def);
            setConnected(true);
          }

          if (msg.type === "engine/status") {
            const p = msg.payload || {};
            if (typeof p.connected === "boolean") setConnected(p.connected);
            if (typeof p.running === "boolean") setRunning(p.running);
            if (p.device) setEngineDevice(String(p.device));
            if (p.state) setStateText(String(p.state));
            if (typeof p.rtf === "number") setRtf(p.rtf);
            if (typeof p.latencyMs === "number") setLatencyMs(p.latencyMs);

            if (activeSessionId && (typeof p.rtf === "number" || typeof p.latencyMs === "number")) {
              pushMetrics(activeSessionId, p.rtf, p.latencyMs);
            }
          }

          if (msg.type === "engine/subtitle") {
            const p = msg.payload || {};
            const ts = p.tsMs ?? Date.now();
            const dstText = p.dstText ?? "";
            const srcText = p.srcText ?? "";
            const partial = !!p.partial;

            setLive({ tsMs: ts, srcText, dstText, partial });

            const segmentEnd = !!p.segmentEnd;
            const take = partialResults ? true : !partial;
            if (!take) return;

            if (segmentEnd && activeSessionId) {
              pushTranscript(activeSessionId, {
                id: `seg-${ts}-${Math.random().toString(16).slice(2)}`,
                tsMs: ts,
                srcText,
                dstText,
                reason: "segmentEnd"
              });
              setSentenceBuf(prev => ({...prev, srcAcc:"", dstAcc:"", lastFinalSrc: srcText, lastFinalDst: dstText}));
              return;
            }

            if (!partial) {
              setSentenceBuf(prev => {
                const srcFull = srcText;
                const dstFull = dstText;

                const srcAdd = (srcFull.startsWith(prev.lastFinalSrc || "")) ? srcFull.slice((prev.lastFinalSrc||"").length) : srcFull;
                const dstAdd = (dstFull.startsWith(prev.lastFinalDst || "")) ? dstFull.slice((prev.lastFinalDst||"").length) : dstFull;

                let srcAcc = prev.srcAcc + srcAdd;
                let dstAcc = prev.dstAcc + dstAdd;

                const dstSplit = extractSentences(dstAcc);
                const srcSplit = extractSentences(srcAcc);
                const n = Math.min(dstSplit.complete.length, srcSplit.complete.length);

                if (activeSessionId) {
                  for (let i=0; i<n; i++){
                    pushTranscript(activeSessionId, {
                      id: `seg-${Date.now()}-${Math.random().toString(16).slice(2)}`,
                      tsMs: Date.now(),
                      srcText: srcSplit.complete[i],
                      dstText: dstSplit.complete[i],
                      reason: "punct"
                    });
                  }
                }

                srcAcc = srcSplit.complete.slice(n).join(" ") + (srcSplit.rest || "");
                dstAcc = dstSplit.complete.slice(n).join(" ") + (dstSplit.rest || "");
                return { srcAcc, dstAcc, lastFinalSrc: srcFull, lastFinalDst: dstFull };
              });
            }
          }

          if (msg.type === "engine/error") {
            const m = msg.payload?.message ?? "エラーが発生しました";
            setLastError({ tsMs: Date.now(), message: m });
            toast.show({ variant:"danger", title:"エンジンエラー", description:m, duration:6000 });
            if (activeSessionId) finishSession(activeSessionId, "error", m);
          }

          if (msg.type === "engine/testResult") {
            const ok = !!msg.payload?.ok;
            const m = msg.payload?.message || (ok ? "利用可能です" : "利用できません");
            toast.show({ variant: ok ? "success" : "danger", title:"接続テスト", description:m, duration:4500 });
          }
        });

        HostBridge.post({ type:"ui/ready", payload:{ app:"Speaksy", version:"full-autoFrom-1" } });
        HostBridge.post({ type:"engine/listDevices" });

        return () => off && off();
      }, [toast, partialResults, activeSessionId, pushTranscript, pushMetrics, finishSession]);

      // demo generator
      useEffect(() => {
        if (!demoMode) return;
        if (!running) return;

        let c = 0;
        const samples = [
          {src:"Tôi sẽ gửi tài liệu sau cuộc họp.", dst:"会議後に資料を送ります。"},
          {src:"Mọi người có ý kiến gì không?", dst:"皆さん、意見はありますか？"},
          {src:"Phần này cần ưu tiên vì thời hạn rất gấp!", dst:"この部分は期限が非常に厳しいので優先が必要です！"},
        ];

        const t = setInterval(() => {
          c++;
          const s = samples[c % samples.length];
          const p1 = s.dst.slice(0, Math.floor(s.dst.length * 0.45));
          const p2 = s.dst.slice(0, Math.floor(s.dst.length * 0.75));

          const emit = (text, partial) => {
            const ts = Date.now();
            setLive({ tsMs: ts, srcText: s.src, dstText: text, partial });
            setStateText("Running");
            setEngineDevice("CPU");
            setRtf(0.62 + (Math.random()*0.08 - 0.04));
            setLatencyMs(620 + Math.floor(Math.random()*120));

            if (!partial && activeSessionId) {
              pushTranscript(activeSessionId, {
                id: `seg-${ts}-${Math.random().toString(16).slice(2)}`,
                tsMs: ts,
                srcText: s.src,
                dstText: s.dst,
                reason: "demo"
              });
            }
          };

          emit(p1, true);
          setTimeout(()=>emit(p2, true), 220);
          setTimeout(()=>emit(s.dst, false), 460);
        }, 1900);

        return () => clearInterval(t);
      }, [demoMode, running, activeSessionId, pushTranscript]);

      const statusPillClass =
        statusKind==="err" ? "pill--err" :
        statusKind==="run" ? "pill--run" : "pill--idle";

      return (
        <div className="app">
          <header className="topbar">
            <div className="brand">
              <div className="brand-badge">S</div>
              <div className="brand-title">
                <div className="t1">Speaksy</div>
                <div className="t2">{t("appTagline")}</div>
              </div>
            </div>

            <div className="topControls">
              <div className="langBar" title="言語ペア">
                <LangDropdown value={fromLang} onChange={setFromLang} options={LANGS_FROM} disabled={running}/>
                <button
                  className="swapTop"
                  onClick={swapLang}
                  disabled={running || fromLang === "auto"}
                  title={fromLang === "auto" ? "Auto検出時は入替できません" : "From/To入替"}
                >⇄</button>
                <LangDropdown value={toLang} onChange={setToLang} options={LANGS_TO} disabled={running}/>
              </div>

              {!running ? (
                <button className="ctaTop" onClick={onStart} disabled={!canStart} title={t("start")}>{t("start")}</button>
              ) : (
                <button className={"ctaTop ctaTopStop"} onClick={onStop} title={t("stop")}>{t("stop")}</button>
              )}
            </div>

            <div className="topRight">
              <div className="uiPrefs">
                <button
                  className="prefBtn"
                  onClick={()=>setTheme(theme==="dark"?"light":"dark")}
                  title={theme==="dark" ? t("themeLight") : t("themeDark")}
                  aria-label="toggle theme"
                >{theme==="dark" ? "☀" : "☾"}</button>
                <div className="uiLangSeg" role="group" aria-label={t("uiLang")}>
                  {["ja","vi","en"].map(lng => (
                    <button
                      key={lng}
                      className={"uiLangBtn " + (uiLang===lng ? "active" : "")}
                      onClick={()=>setUiLang(lng)}
                      title={t("uiLang")}
                    >{lng.toUpperCase()}</button>
                  ))}
                </div>
              </div>
              <span className={"pill " + statusPillClass}>
                <span className={"dot " + statusKind}></span>
                <span className="txt">{statusLabel} / {engineInfo}</span>
                <span className={"eq " + (running ? "running" : "")} aria-hidden="true">
                  <span className="bar"></span><span className="bar"></span><span className="bar"></span><span className="bar"></span><span className="bar"></span>
                </span>
              </span>
            </div>
          </header>

          <div className="body">
            <aside className="sidebar">
              <button
                className={"navBtn " + (page==="translate" ? "active" : "") + (running ? " running" : "")}
                onClick={()=>setPage("translate")}
                title={t("navTranslate")}
              >
                <Icon.translate/>
              </button>

              <button
                className={"navBtn " + (page==="history" ? "active" : "")}
                onClick={()=>setPage("history")}
                title={t("navHistory")}
              >
                <Icon.history/>
              </button>

              <button
                className={"navBtn " + (page==="settings" ? "active" : "")}
                onClick={()=>!running && setPage("settings")}
                disabled={running}
                title={t("navSettings")}
              >
                <Icon.settings/>
              </button>
            </aside>

            <main className="content">
              {page === "translate" && (
                <TranslateView
                  toast={toast}
                  t={t}
                  running={running}
                  fromLang={fromLang}
                  toLang={toLang}
                  live={live}
                  showSource={showSource}
                  sentenceBuf={sentenceBuf}
                  activeSession={activeSession}
                  selectedSegId={selectedSegId}
                  setSelectedSegId={setSelectedSegId}
                  copySeg={copySeg}
                  exportSessionJson={exportSessionJson}
                />
              )}

              {page === "history" && (
                <HistoryView
                  t={t}
                  sessions={sessions}
                  selectedSessionId={selectedSessionId}
                  setSelectedSessionId={setSelectedSessionId}
                  selectedSession={selectedSession}
                  selectedHistSegId={selectedHistSegId}
                  setSelectedHistSegId={setSelectedHistSegId}
                  showSource={showSource}
                  copySeg={copySeg}
                  exportSessionJson={exportSessionJson}
                />
              )}

              {page === "settings" && (
                <SettingsView
                  t={t}
                  theme={theme}
                  setTheme={setTheme}
                  uiLang={uiLang}
                  setUiLang={setUiLang}
                  running={running}
                  inputDevices={inputDevices}
                  inputDeviceId={inputDeviceId}
                  setInputDeviceId={setInputDeviceId}
                  showSource={showSource}
                  setShowSource={setShowSource}
                  partialResults={partialResults}
                  setPartialResults={setPartialResults}
                  demoMode={demoMode}
                  setDemoMode={setDemoMode}
                  autoSaveMs={autoSaveMs}
                  setAutoSaveMs={setAutoSaveMs}
                  requestDeviceTest={requestDeviceTest}
                />
              )}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ToastProvider><App/></ToastProvider>);
  </script>
</body>
</html>
