<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Speaksy — Full UI (Auto From Default + Flag/Swap Fix)</title>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap');

    :root{
      --color-primary:#495D92;
      --color-primary-hover:#3A4D7A;

      --color-success:#2E7D32;
      --color-danger:#B42318;
      --color-info:#1F6FEB;

      --color-bg:#F6FAFE;
      --color-card:#FFFFFF;
      --color-border:#E5E7EB;
      --color-border-light:#F0F0F0;
      --color-text:#1C1C1E;
      --color-text-secondary:#6B7280;

      --font-family:'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Yu Gothic UI', sans-serif;
      --font-family-mono: ui-monospace, SFMono-Regular, Consolas, monospace;

      --radius-sm:10px;
      --radius-md:12px;
      --radius-lg:14px;
      --radius-pill:999px;

      --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
      --shadow-md:0 2px 12px rgba(0,0,0,0.10);
      --shadow-xl:0 12px 44px rgba(0,0,0,0.20);

      --nav-height:60px;
      --sidebar-w:72px;

      /* 選択表現（統一） */
      --sel-border: rgba(31,111,235,0.55);
      --sel-bg: rgba(31,111,235,0.14);
      --sel-bg-soft: rgba(31,111,235,0.09);
      --sel-shadow: rgba(31,111,235,0.18);

      /* Live */
      --live-bg: linear-gradient(180deg, #ffffff 0%, #F2F7FF 100%);
      --live-border: rgba(31,111,235,0.25);
    }

    /* ===== Dark theme: override the same tokens ===== */
    :root[data-theme="dark"]{
      --color-primary:#5B6FA8;
      --color-primary-hover:#6D81BC;

      --color-success:#4CAF50;
      --color-danger:#EF5350;
      --color-info:#5AA0FF;

      --color-bg:#0F1419;
      --color-card:#1A2027;
      --color-border:#2A3138;
      --color-border-light:#222931;
      --color-text:#E6EAF0;
      --color-text-secondary:#9AA4B2;

      --shadow-sm:0 1px 3px rgba(0,0,0,0.40);
      --shadow-md:0 2px 12px rgba(0,0,0,0.50);
      --shadow-xl:0 12px 44px rgba(0,0,0,0.65);

      --sel-border: rgba(90,160,255,0.55);
      --sel-bg: rgba(90,160,255,0.18);
      --sel-bg-soft: rgba(90,160,255,0.10);
      --sel-shadow: rgba(90,160,255,0.22);

      --live-bg: linear-gradient(180deg, #1A2027 0%, #1E2630 100%);
      --live-border: rgba(90,160,255,0.30);
    }
    :root[data-theme="dark"] ::-webkit-scrollbar-thumb{ background:#3A434E; }
    /* Cards/headers that hardcoded a white gradient need to follow the theme. */
    :root[data-theme="dark"] .card-hd,
    :root[data-theme="dark"] .historyHd,
    :root[data-theme="dark"] .panelHd,
    :root[data-theme="dark"] .dayGroupHd{
      background:linear-gradient(180deg, var(--color-card) 0%, var(--color-bg) 100%);
    }
    :root[data-theme="dark"] .badge,
    :root[data-theme="dark"] .pillMini,
    :root[data-theme="dark"] .chip,
    :root[data-theme="dark"] .countPill,
    :root[data-theme="dark"] .chev,
    :root[data-theme="dark"] .cSelectMenu,
    :root[data-theme="dark"] .timelineItem,
    :root[data-theme="dark"] .sessRow,
    :root[data-theme="dark"] .field,
    :root[data-theme="dark"] .btn{ background:var(--color-card); color:var(--color-text); }
    :root[data-theme="dark"] .historyBd{
      background:linear-gradient(180deg, rgba(26,32,39,0.85), rgba(26,32,39,0) 34%), var(--color-card);
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family:var(--font-family);
      font-size:14px;
      background:var(--color-bg);
      color:var(--color-text);
      line-height:1.6;
      -webkit-font-smoothing:antialiased;
      transition:background .2s ease, color .2s ease;
    }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:3px; }
    :focus-visible { outline:2px solid var(--color-primary); outline-offset:2px; }

    /* ===== App chrome ===== */
    .app{ min-height:100vh; display:flex; flex-direction:column; }
    .topbar{
      height:var(--nav-height);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 14px;
      background:var(--color-primary);
      color:#fff;
      position:sticky;
      top:0;
      z-index:10;
      gap:12px;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      user-select:none; min-width:180px;
    }
    .brand-badge{
      width:28px;height:28px;border-radius:8px;
      background:rgba(255,255,255,0.18);
      display:flex;align-items:center;justify-content:center;
      font-weight:900;
      flex-shrink:0;
    }
    .brand-title{ display:flex; flex-direction:column; gap:2px; line-height:1.0; min-width:0; }
    .brand-title .t1{ font-size:13px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .brand-title .t2{ font-size:11px; font-weight:700; opacity:0.86; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .topControls{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex:1;
      min-width:0;
    }

    /* ===== Custom select (topbar) ===== */
    .langBar{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
    }
    .swapTop{
      width:44px;
      height:36px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.45);
      background:linear-gradient(180deg, #ffffff 0%, #F7FAFF 100%);
      color:var(--color-primary);
      font-weight:900;
      cursor:pointer;
      transition:transform .12s ease-out;
      flex-shrink:0;
    }
    .swapTop:hover{ transform:translateY(-1px); }
    .swapTop:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }

    .ctaTop{
      height:40px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.70);
      background:linear-gradient(180deg, #ffffff 0%, #F7FAFF 100%);
      color:var(--color-primary);
      font-weight:900;
      font-size:13px;
      cursor:pointer;
      transition:transform .12s ease-out;
      flex-shrink:0;
    }
    .ctaTop:hover{ transform:translateY(-1px); }
    .ctaTop:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }
    .ctaTopStop{
      border:1px solid rgba(255,255,255,0.42);
      background:rgba(255,255,255,0.12);
      color:#fff;
    }

    .cSelect{ position:relative; }
    .cSelectBtn{
      height:36px;
      min-width:180px;
      max-width:240px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.10);
      color:#fff;
      font-weight:900;
      font-size:12px;
      padding:0 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      user-select:none;
    }
    .cSelectBtn:disabled{ opacity:0.6; cursor:not-allowed; }
    .cSelectLeft{ display:flex; align-items:center; gap:8px; min-width:0; }
    .cSelectLabel{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cSelectCaret{ opacity:0.9; font-weight:900; }
    .cSelectMenu{
      position:absolute;
      top:calc(100% + 8px);
      left:0; right:0;
      background:#fff;
      border:1px solid var(--color-border);
      border-radius:14px;
      box-shadow:var(--shadow-md);
      padding:6px;
      z-index:50;
    }
    .cSelectItem{
      width:100%;
      display:flex;
      align-items:center;
      gap:10px;
      padding:9px 10px;
      border-radius:12px;
      border:none;
      background:transparent;
      cursor:pointer;
      text-align:left;
      font-weight:900;
      font-size:13px;
      color:var(--color-text);
    }
    .cSelectItem:hover{ background:#F3F4F6; }
    .cSelectItem.active{ background: rgba(234,242,255,0.9); }
    .cSelectItem small{ color:var(--color-text-secondary); font-weight:800; }

    /* ===== status ===== */
    .topRight{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      min-width:240px;
      gap:10px;
    }

    /* ===== UI prefs (theme + language) ===== */
    .uiPrefs{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .prefBtn{
      width:36px; height:36px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.30);
      background:rgba(255,255,255,0.12);
      color:#fff;
      font-size:15px;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:transform .12s ease-out, background .12s ease-out;
    }
    .prefBtn:hover{ background:rgba(255,255,255,0.22); transform:translateY(-1px); }
    .uiLangSeg{
      display:flex;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.24);
      background:rgba(255,255,255,0.10);
      overflow:hidden;
    }
    .uiLangBtn{
      border:none;
      background:transparent;
      color:rgba(255,255,255,0.75);
      font-weight:900;
      font-size:11px;
      padding:7px 9px;
      cursor:pointer;
      transition:background .12s ease-out, color .12s ease-out;
    }
    .uiLangBtn:hover{ background:rgba(255,255,255,0.14); color:#fff; }
    .uiLangBtn.active{ background:#fff; color:var(--color-primary); }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:var(--radius-pill);
      border:1px solid rgba(255,255,255,0.35);
      color:#fff;
      font-size:12px;
      font-weight:900;
      max-width:520px;
      overflow:hidden;
      white-space:nowrap;
      background:rgba(255,255,255,0.12);
    }
    .pill .txt{ min-width:0; overflow:hidden; text-overflow:ellipsis; }
    .pill--idle{ background:rgba(31,111,235,0.20); border-color:rgba(182,208,255,0.42); }
    .pill--run{  background:rgba(46,125,50,0.22);  border-color:rgba(167,243,208,0.42); }
    .pill--err{  background:rgba(180,35,24,0.24);  border-color:rgba(253,164,175,0.52); }

    .dot{
      width:10px; height:10px; border-radius:50%;
      box-shadow:0 0 0 3px rgba(255,255,255,0.12);
      flex-shrink:0;
      background:rgba(255,255,255,0.55);
    }
    .dot.idle{ background:#93C5FD; }
    .dot.run{  background:#86EFAC; }
    .dot.err{  background:#FDA4AF; }

    .eq{ display:flex; gap:3px; height:16px; align-items:flex-end; margin-left:auto; flex-shrink:0; }
    .bar{ width:4px; height:100%; background:rgba(255,255,255,0.90); border-radius:3px; transform-origin:bottom; transform:scaleY(0.25); opacity:0.9; }
    @keyframes eqAnim { 0%{transform:scaleY(0.25);} 35%{transform:scaleY(1);} 70%{transform:scaleY(0.45);} 100%{transform:scaleY(0.25);} }
    .eq.running .bar:nth-child(1){ animation:eqAnim 0.9s ease-in-out infinite; }
    .eq.running .bar:nth-child(2){ animation:eqAnim 0.8s ease-in-out infinite 0.05s; }
    .eq.running .bar:nth-child(3){ animation:eqAnim 0.75s ease-in-out infinite 0.12s; }
    .eq.running .bar:nth-child(4){ animation:eqAnim 0.85s ease-in-out infinite 0.08s; }
    .eq.running .bar:nth-child(5){ animation:eqAnim 0.95s ease-in-out infinite 0.02s; }

    /* ===== Body with sidebar ===== */
    .body{
      display:grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height:0;
      flex:1;
    }
    .sidebar{
      background:#fff;
      border-right:1px solid var(--color-border);
      padding:10px 8px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .navBtn{
      width:100%;
      height:56px;
      border-radius:16px;
      border:1px solid var(--color-border);
      background:#fff;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all .12s ease-out;
      position:relative;
      user-select:none;
    }
    .navBtn:hover{ background:#F3F4F6; transform:translateY(-1px); }
    .navBtn.active{
      border-color: rgba(31,111,235,0.35);
      background: rgba(234,242,255,0.85);
    }
    .navBtn:disabled{ opacity:0.55; cursor:not-allowed; transform:none; }
    .navIcon{ width:22px; height:22px; color:var(--color-primary); }
    .navBtn.active .navIcon{ color: var(--color-info); }

    /* 翻訳中を強調 */
    .navBtn.running{
      border-color: rgba(46,125,50,0.35);
      background: rgba(232,245,233,0.90);
    }
    .navBtn.running .navIcon{ color: var(--color-success); }
    .navBtn.running::after{
      content:"RUN";
      position:absolute;
      right:8px;
      bottom:8px;
      font-size:10px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      background: rgba(46,125,50,0.18);
      border:1px solid rgba(46,125,50,0.24);
      color: var(--color-success);
    }

    .content{
      padding:14px 16px;
      min-height:0;
    }

    /* ===== Common UI ===== */
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px;
      border-radius:var(--radius-sm);
      padding:8px 10px;
      cursor:pointer;
      font-weight:900;
      border:1px solid var(--color-border);
      background:#fff;
      transition:all .12s ease-out;
      user-select:none;
      white-space:nowrap;
      font-size:13px;
      color:var(--color-text);
    }
    .btn:hover{ background:#F3F4F6; }
    .btn:disabled{ cursor:not-allowed; opacity:0.55; }
    .btn-ghost{ background:transparent; }

    .card{
      background:var(--color-card);
      border:1px solid var(--color-border);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-sm);
      overflow:hidden;
    }
    .card-hd{
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid var(--color-border-light);
      background:linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }
    .card-ttl{ font-size:13px; font-weight:900; color:var(--color-text); }
    .card-bd{ padding:14px; }

    .field{
      width:100%;
      border:1px solid var(--color-border);
      background:#fff;
      border-radius:12px;
      padding:10px 10px;
      font-family:var(--font-family);
      font-size:14px;
      transition:all .12s ease-out;
      outline:none;
    }
    .field:focus{ border-color:var(--color-primary); box-shadow:0 0 0 3px rgba(73,93,146,0.10); }
    .field:disabled{ background:#F3F4F6; cursor:not-allowed; opacity:0.85; }

    .formrow{ margin-bottom:14px; }
    .label{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:7px;
      font-size:13px; font-weight:900; color:var(--color-text);
    }
    .help{ font-size:12px; color:var(--color-text-secondary); margin-top:6px; }
    .toggle{ display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-size:13px; color:var(--color-text); }
    .toggle input{ accent-color: var(--color-primary); }

    .muted{ color:var(--color-text-secondary); font-size:13px; }
    .mono{ font-family:var(--font-family-mono); }

    /* ===== Flag icons ===== */
    .flagFrame{
      width:18px; height:18px;
      border-radius:4px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,0.12);
      flex-shrink:0;
    }

    /* ===== Translate view ===== */
    .subtitleShell{ display:flex; flex-direction:column; gap:12px; min-height:0; }
    .liveBox{
      border:1px solid var(--live-border);
      border-radius:var(--radius-lg);
      background:var(--live-bg);
      box-shadow:var(--shadow-md);
      padding:16px;
      position:relative;
      overflow:hidden;
    }
    .liveBox::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width:5px;
      background:linear-gradient(180deg, rgba(31,111,235,0.62), rgba(73,93,146,0.32));
    }
    .liveTop{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; padding-left:8px; }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid var(--color-border);
      background:#fff;
      font-size:12px;
      font-weight:900;
      color:var(--color-text-secondary);
      white-space:nowrap;
    }
    .liveTime{ font-size:12px; color:var(--color-text-secondary); font-family:var(--font-family-mono); white-space:nowrap; }
    .liveText{
      padding-left:8px;
      font-size:30px;
      font-weight:900;
      line-height:1.28;
      white-space:pre-wrap;
      word-break:break-word;
      min-height:110px;
    }
    .liveSrc{
      margin-top:10px;
      padding-left:8px;
      font-size:13px;
      color:var(--color-text-secondary);
      white-space:pre-wrap;
      word-break:break-word;
    }
    .liveHint{
      margin-top:12px;
      padding-left:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:12px;
      color:var(--color-text-secondary);
    }

    .historyWrap{
      border:1px solid var(--color-border);
      border-radius:var(--radius-lg);
      background:#fff;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      box-shadow:var(--shadow-sm);
      min-height:0;
    }
    .historyHd{
      padding:12px 14px;
      border-bottom:1px solid var(--color-border-light);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }
    .historyTtl{ font-size:13px; font-weight:900; color:var(--color-text); }
    .historyBd{
      padding:12px 14px;
      overflow:auto;
      min-height:240px;
      max-height: calc(100vh - var(--nav-height) - 240px);
      background:
        linear-gradient(180deg, rgba(248,250,252,0.85), rgba(248,250,252,0.00) 34%),
        #fff;
    }

    .timelineItem{
      display:grid;
      grid-template-columns: 140px 1fr;
      gap:12px;
      padding:10px 10px;
      border:1px solid var(--color-border-light);
      border-radius:12px;
      background:#fff;
      margin-bottom:8px;
      cursor:pointer;
      position:relative;
    }
    .timelineItem:hover{ background: rgba(248,250,252,0.9); }
    .timelineItem.selected{
      border-color: var(--sel-border);
      background: var(--sel-bg-soft);
      box-shadow: 0 0 0 2px var(--sel-shadow) inset;
    }
    .tTime{ font-family:var(--font-family-mono); font-size:12px; color:var(--color-text-secondary); line-height:1.2; }
    .tTag{
      display:inline-flex;
      margin-top:8px;
      font-size:11px;
      font-weight:900;
      padding:2px 8px;
      border-radius:999px;
      background: rgba(73,93,146,0.10);
      color: var(--color-primary);
      border:1px solid rgba(73,93,146,0.12);
      white-space:nowrap;
    }
    .tMain{ min-width:0; position:relative; }
    .tDst{ font-size:15px; font-weight:900; line-height:1.55; white-space:pre-wrap; word-break:break-word; padding-right:88px; }
    .tSrc{ margin-top:6px; font-size:13px; color:var(--color-text-secondary); white-space:pre-wrap; word-break:break-word; padding-right:88px; }
    .copyBadge{
      position:absolute; top:0; right:0;
      display:inline-flex; align-items:center; justify-content:center;
      height:28px; padding:0 10px;
      border-radius:999px;
      border:1px solid rgba(31,111,235,0.22);
      background:#fff;
      color:var(--color-info);
      font-size:12px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
    }
    .timelineItem.selected .copyBadge{
      border-color: rgba(31,111,235,0.35);
      background: rgba(234,242,255,0.95);
    }

    /* ===== History view (group + collapse + minimap) ===== */
    .historyLayout{
      display:grid;
      grid-template-columns: 520px 1fr;
      gap:14px;
      min-height:0;
      align-items:start;
    }
    @media (max-width: 1100px){
      .historyLayout{ grid-template-columns:1fr; }
    }
    .panel{
      background:var(--color-card);
      border:1px solid var(--color-border);
      border-radius:var(--radius-lg);
      overflow:hidden;
      min-height:0;
    }
    .panelHd{
      padding:12px 14px;
      border-bottom:1px solid var(--color-border-light);

      grid-template-columns: 12px 1fr;

    .miniViewport{

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;

      gap:10px;

    .toast-x{ margin-left:auto; border:none; background:transparent; cursor:pointer; color:var(--color-text-secondary); padding:4px; font-weight:900; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useEffect, useMemo, useRef, useState, useCallback, createContext, useContext, useId } = React;

    /* ========= Host Bridge (WebView2 | WebSocket | postMessage) ========= */
    const HostBridge = (() => {
      const canWebView2 = () => !!(window.chrome && window.chrome.webview);
      // Served over http(s) ⇒ a host_server is behind us ⇒ talk WebSocket.
      const useWS = () => !canWebView2() && /^https?:$/.test(location.protocol);

      let ws = null;
      const handlers = new Set();
      const outbox = [];

      const connectWS = () => {
        if (ws) return;
        const url = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";
        try { ws = new WebSocket(url); }
        catch (e) { console.warn("[Speaksy] WS connect failed", e); return; }
        ws.onopen = () => { while (outbox.length) ws.send(JSON.stringify(outbox.shift())); };
        ws.onmessage = (ev) => {
          let data; try { data = JSON.parse(ev.data); } catch { return; }
          handlers.forEach((h) => h(data));
        };
        ws.onclose = () => { ws = null; };
        ws.onerror = () => {};
      };
      if (useWS()) connectWS();

      const hasHost = () => canWebView2() || useWS();

      const post = (msg) => {
        if (canWebView2()) { window.chrome.webview.postMessage(msg); return; }
        if (useWS()) {
          if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
          else outbox.push(msg);
          return;
        }
        console.log("[Speaksy:UI->Host]", msg);
      };

      const onMessage = (handler) => {
        if (canWebView2()) {
          const h = (e) => handler(e.data);
          window.chrome.webview.addEventListener("message", h);
          return () => window.chrome.webview.removeEventListener("message", h);
        }
        if (useWS()) {
          handlers.add(handler);
          return () => handlers.delete(handler);
        }
        const h = (e) => handler(e.data);
        window.addEventListener("message", h);
        return () => window.removeEventListener("message", h);
      };

      return { canWebView2, hasHost, post, onMessage };
    })();

    /* ========= Toast ========= */
    const ToastContext = createContext(null);
    const ToastProvider = ({ children }) => {
      const [toast, setToast] = useState(null);
      const timerRef = useRef(null);
      const show = useCallback((opts) => {
        if (timerRef.current) clearTimeout(timerRef.current);
        setToast(opts);
        const duration = opts.duration ?? 3500;
        timerRef.current = setTimeout(() => setToast(null), duration);
      }, []);
      const close = useCallback(() => {
        if (timerRef.current) clearTimeout(timerRef.current);
        setToast(null);
      }, []);
      return (
        <ToastContext.Provider value={{ show, close }}>
          {children}
          {toast && (
            <div className="toast" style={{
              borderLeftColor:
                toast.variant === "success" ? "var(--color-success)" :
                toast.variant === "danger"  ? "var(--color-danger)"  :
                "var(--color-info)"
            }}>
              <div style={{flex:1, minWidth:0}}>
                <div className="toast-ttl">{toast.title ?? "通知"}</div>
                {toast.description && <div className="toast-desc">{toast.description}</div>}
              </div>
              <button className="toast-x" onClick={close} title="閉じる">✕</button>
            </div>
          )}
        </ToastContext.Provider>
      );
    };
    const useToast = () => useContext(ToastContext);

    /* ========= Utils ========= */
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const avg = (arr) => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length) : null;

    const formatTimeMs = (ms) => {
      try{
        const d = new Date(ms);
        const hh = String(d.getHours()).padStart(2,"0");
        const mm = String(d.getMinutes()).padStart(2,"0");
        const ss = String(d.getSeconds()).padStart(2,"0");
        const mmm = String(d.getMilliseconds()).padStart(3,"0");
        return `${hh}:${mm}:${ss}.${mmm}`;
      }catch{ return ""; }
    };

    const formatDateTime = (ms) => {
      try{
        const d = new Date(ms);
        const yyyy = d.getFullYear();
        const MM = String(d.getMonth()+1).padStart(2,"0");
        const dd = String(d.getDate()).padStart(2,"0");
        const hh = String(d.getHours()).padStart(2,"0");
        const mm = String(d.getMinutes()).padStart(2,"0");
        const ss = String(d.getSeconds()).padStart(2,"0");
        return `${yyyy}/${MM}/${dd} ${hh}:${mm}:${ss}`;
      }catch{ return ""; }
    };

    const dateKey = (ms) => {
      const d = new Date(ms);
      const yyyy = d.getFullYear();
      const MM = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");
      return `${yyyy}/${MM}/${dd}`;
    };

    const dateLabel = (ms, lang="ja") => {
      const k = dateKey(ms);
      const today = dateKey(Date.now());
      const y = new Date(); y.setDate(y.getDate()-1);
      const yesterday = dateKey(+y);
      const L = (STRINGS[lang] || STRINGS.ja);
      if (k === today) return L.today;
      if (k === yesterday) return L.yesterday;
      return k;
    };

    const extractSentences = (text) => {
      const t = (text ?? "");
      if (!t.trim()) return { complete: [], rest: "" };
      const re = /.*?[。！？!?](?:\s+|$)|.*?\.(?:\s+|$)/g;
      const complete = [];
      let lastIndex = 0;
      let m;
      while ((m = re.exec(t)) !== null) {
        const s = m[0];
        if (s && s.trim()) {
          complete.push(s.trim());
          lastIndex = re.lastIndex;
        } else break;
      }
      const rest = t.slice(lastIndex);
      return { complete, rest };
    };

    const loadJson = (key, fallback) => {
      try{ const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; }
      catch{ return fallback; }
    };
    const saveJson = (key, obj) => {
      try{ localStorage.setItem(key, JSON.stringify(obj)); }catch{}
    };

    /* ========= Theme (dark / light) ========= */
    const applyTheme = (theme) => {
      const t = theme === "dark" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", t);
      try{ localStorage.setItem("speaksy.theme", t); }catch{}
    };
    const initialTheme = (() => {
      try{
        const saved = localStorage.getItem("speaksy.theme");
        if (saved === "dark" || saved === "light") return saved;
      }catch{}
      return (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ? "dark" : "light";
    })();

    /* ========= i18n (UI chrome strings) ========= */
    const STRINGS = {
      ja: {
        appTagline:"気軽に話せる多言語通訳",
        start:"翻訳開始", stop:"翻訳停止", connTest:"接続テスト",

        pastLog:"過去ログ（文単位）", copySel:"選択をコピー", jsonOut:"JSON出力",
        noActiveSession:"実行中のセッションがありません（開始すると履歴が溜まります）。",
        noSentenceLog:"まだ文単位ログがありません。",
        startPrompt:"上部の「翻訳開始」でリアルタイム字幕を開始します",
        histTitle:"履歴（セッション一覧）", histEmpty:"まだ履歴がありません。翻訳開始→停止で履歴が作成されます。",
        toggleAll:"全開閉", total:"合計",
        sessDetail:"セッション詳細（字幕ログ）", pickSession:"左のセッションを選択してください。",
        noSubLog:"字幕ログがありません。",
        settings:"設定", settingsLocked:"翻訳中は設定操作を禁止しています（サイドメニューの設定も無効）。",
        inputDevice:"入力デバイス", showSrc:"原文（SRC）表示", showSrcLabel:"原文を表示する",
        showSrcHelp:"デフォルトON。翻訳/履歴にSRCも併記します。",
        partial:"途中結果（partial）", partialLabel:"partialを有効にする",
        demoMode:"デモモード", demoLabel:"デモモード",
        autoSave:"自動保存（テキスト出力）間隔（ms）",
        theme:"テーマ", themeLight:"ライト", themeDark:"ダーク", uiLang:"UI言語",
        today:"今日", yesterday:"昨日",
      },
      vi: {
        appTagline:"Phiên dịch đa ngôn ngữ thân thiện",
        start:"Bắt đầu dịch", stop:"Dừng dịch", connTest:"Kiểm tra kết nối",
        navTranslate:"Dịch", navHistory:"Lịch sử", navSettings:"Cài đặt",
        stIdle:"Chờ", stRun:"Đang dịch", stErr:"Lỗi", stDisconnected:"Mất kết nối",
        liveHintTitle:"Lịch sử: theo câu", liveHintEngine:"khuyến nghị segmentEnd:true ở engine",
        pastLog:"Nhật ký (theo câu)", copySel:"Sao chép mục chọn", jsonOut:"Xuất JSON",
        noActiveSession:"Chưa có phiên đang chạy (bắt đầu để tích lũy lịch sử).",

        toggleAll:"Mở/đóng tất cả", total:"Tổng",

        inputDevice:"Thiết bị nhập", showSrc:"Hiện bản gốc (SRC)", showSrcLabel:"Hiện văn bản gốc",
        showSrcHelp:"Mặc định BẬT. Hiện cả SRC trong phần dịch/lịch sử.",
        partial:"Kết quả tạm (partial)", partialLabel:"Bật partial",

        theme:"Giao diện", themeLight:"Sáng", themeDark:"Tối", uiLang:"Ngôn ngữ UI",
        today:"Hôm nay", yesterday:"Hôm qua",
      },
      en: {
        appTagline:"Friendly multilingual interpreter",
        start:"Start", stop:"Stop", connTest:"Test connection",
        navTranslate:"Translate", navHistory:"History", navSettings:"Settings",
        stIdle:"Idle", stRun:"Translating", stErr:"Error", stDisconnected:"Disconnected",

        pastLog:"Past log (per sentence)", copySel:"Copy selection", jsonOut:"Export JSON",
        noActiveSession:"No active session (start to accumulate history).",
        noSentenceLog:"No per-sentence log yet.",
        startPrompt:"Click \"Start\" above to begin real-time subtitles",

        toggleAll:"Toggle all", total:"Total",

    };
    const initialUiLang = (() => {
      try{ const s = localStorage.getItem("speaksy.uiLang"); if (STRINGS[s]) return s; }catch{}
      return "ja";
    })();

    /* ========= Icons ========= */
    const Icon = {
      translate: () => (
        <svg className="navIcon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M4 5h9a2 2 0 0 1 2 2v2h5v10a2 2 0 0 1-2 2H11a2 2 0 0 1-2-2v-2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm0 2v8h9V7H4zm7.2 10.2V19h7V11h-5v6.2z"/>

      ),
      settings: () => (
        <svg className="navIcon" viewBox="0 0 24 24" aria-hidden="true">
